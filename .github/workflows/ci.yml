name: Library Management CI

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ==========================================================================
  # Job 1: Unit Tests (fast, no Docker required)
  # ==========================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: mvn test -B

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: target/surefire-reports/

  # ==========================================================================
  # Job 2: Integration + API Tests (requires Docker for TestContainers)
  # ==========================================================================
  integration-tests:
    name: Integration & API Tests
    runs-on: ubuntu-latest
    needs: unit-tests  # only run if unit tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Docker is pre-installed on ubuntu-latest, TestContainers will use it
      # Skip surefire (unit tests) — they already ran in the previous job.
      # Failsafe will still run *IT.java tests via `mvn verify`.
      - name: Run integration tests
        run: mvn verify -B -Dsurefire.skip=true

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: target/failsafe-reports/

  # ==========================================================================
  # Job 3: Build (only after all tests pass)
  # ==========================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [ unit-tests, integration-tests ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR (skip tests — already passed)
        run: mvn package -B -DskipTests

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [ unit-tests, integration-tests ]
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR (skip tests — already passed)
        run: mvn package -B -DskipTests

      - name: Publish GitHub Release with JAR
        uses: softprops/action-gh-release@2ea29ca40af18b8b5a37bd6c1d27c5b89f3690e0
        with:
          files: target/*.jar
          generate_release_notes: true
